version: 1
name: asdf-node
description: Example of a manual install that must be performed inside the world.
runnable: true
entrypoints: ["node", "npm", "npx"]
install:
  method: manual
  manual_instructions: |
    Install nodejs via asdf manually inside the world, then ensure `node`, `npm`, and `npx`
    are reachable from:
      /var/lib/substrate/world-deps/bin

    Example (inside the world):
      export ASDF_DIR="${ASDF_DIR:-$HOME/.asdf}"
      "$ASDF_DIR/bin/asdf" plugin add nodejs https://github.com/asdf-vm/asdf-nodejs.git
      "$ASDF_DIR/bin/asdf" install nodejs latest
      "$ASDF_DIR/bin/asdf" global nodejs latest
      ln -sf "$ASDF_DIR/shims/node" /var/lib/substrate/world-deps/bin/node
      ln -sf "$ASDF_DIR/shims/npm" /var/lib/substrate/world-deps/bin/npm
      ln -sf "$ASDF_DIR/shims/npx" /var/lib/substrate/world-deps/bin/npx
probe:
  command: "command -v node >/dev/null 2>&1 && command -v npm >/dev/null 2>&1 && command -v npx >/dev/null 2>&1"

