version: 1
id: codex
config:
  kind: cli
  enabled: true
  protocol: uaa.agent.session
  execution:
    scope: host
  cli:
    binary: codex
    mode: persistent
  capabilities:
    session_start: true
    session_resume: true
    session_fork: true
    session_stop: true
    status_snapshot: true
    event_stream: true
    llm: true
    mcp_client: false
