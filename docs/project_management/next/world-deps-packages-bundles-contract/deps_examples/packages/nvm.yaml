version: 1
name: nvm
description: Node Version Manager (requires a wrapper; nvm is a bash function).
runnable: true
entrypoints: ["nvm"]
wrappers:
  - name: nvm
    kind: bash_function
    bash_source: "${NVM_DIR:-$HOME/.nvm}/nvm.sh"
    function: nvm
install:
  method: script
  script_path: ../scripts/nvm.sh
probe:
  command: "/bin/bash -lc 'source \"${NVM_DIR:-$HOME/.nvm}/nvm.sh\" && nvm --version'"

