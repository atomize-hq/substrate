name: CI Testing

on:
  pull_request:
    branches:
      - testing
  workflow_call:
    inputs:
      checkout_ref:
        required: false
        type: string
      runner_kind:
        description: "Where to run jobs: github-hosted|self-hosted"
        required: false
        type: string
        default: github-hosted
      mode:
        description: "CI mode: full|quick|compile-parity"
        required: false
        type: string
        default: full
  workflow_dispatch:
    inputs:
      checkout_ref:
        description: "Git ref to checkout for running CI Testing (defaults to workflow ref HEAD)."
        required: false
        default: ""
      runner_kind:
        description: "Where to run jobs: github-hosted|self-hosted"
        required: false
        type: choice
        options:
          - github-hosted
          - self-hosted
        default: github-hosted
      mode:
        description: "CI mode: full|quick|compile-parity (quick skips docs/cross-build; compile-parity skips tests/builds too)"
        required: false
        default: "full"

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: 1.89.0
  CI_MODE: ${{ inputs.mode || 'full' }}
  CI_RUNNER_KIND: ${{ inputs.runner_kind || 'github-hosted' }}

jobs:
  lint-and-test:
    name: Lint & Test (${{ matrix.name }})
    runs-on: ${{ env.CI_RUNNER_KIND == 'self-hosted' && fromJson(matrix.self_hosted) || matrix.hosted }}
    strategy:
      fail-fast: ${{ github.event_name != 'pull_request' }}
      matrix:
        include:
          - name: ubuntu-24.04
            hosted: ubuntu-24.04
            self_hosted: '["self-hosted","Linux","linux-host"]'
          - name: macos-14
            hosted: macos-14
            self_hosted: '["self-hosted","macOS"]'
          - name: windows-2022
            hosted: windows-2022
            self_hosted: '["self-hosted","Windows"]'

    steps:
      - name: Checkout repository (override ref)
        if: inputs.checkout_ref != ''
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.checkout_ref }}
          submodules: recursive

      - name: Checkout repository
        if: inputs.checkout_ref == ''
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux' && env.CI_MODE != 'compile-parity' && env.CI_RUNNER_KIND != 'self-hosted'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libseccomp-dev shellcheck shfmt

      - name: Install system dependencies (Linux, compile parity)
        if: runner.os == 'Linux' && env.CI_MODE == 'compile-parity' && env.CI_RUNNER_KIND != 'self-hosted'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libseccomp-dev

      - name: Preflight system dependencies (Linux self-hosted)
        if: runner.os == 'Linux' && env.CI_RUNNER_KIND == 'self-hosted'
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v pkg-config >/dev/null 2>&1; then
            echo "Missing pkg-config on self-hosted Linux runner." >&2
            exit 1
          fi
          if ! pkg-config --exists libseccomp; then
            echo "Missing libseccomp development package on self-hosted Linux runner." >&2
            exit 1
          fi
          if [[ "${CI_MODE}" != "compile-parity" ]]; then
            if ! command -v shellcheck >/dev/null 2>&1; then
              echo "Missing shellcheck on self-hosted Linux runner." >&2
              exit 1
            fi
            if ! command -v shfmt >/dev/null 2>&1; then
              echo "Missing shfmt on self-hosted Linux runner." >&2
              exit 1
            fi
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ env.RUST_TOOLCHAIN }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-${{ env.RUST_TOOLCHAIN }}-

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo check (compile parity; all targets)
        if: env.CI_MODE == 'compile-parity'
        run: cargo check --workspace --all-targets

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Cargo build (debug)
        if: env.CI_MODE != 'compile-parity'
        run: cargo build --workspace

      - name: Build telemetry cdylib (Unix)
        if: runner.os != 'Windows' && env.CI_MODE != 'compile-parity'
        run: cargo rustc -p substrate-telemetry --profile dist --crate-type=rlib,cdylib

      - name: Build telemetry cdylib (Windows)
        if: runner.os == 'Windows' && env.CI_MODE != 'compile-parity'
        shell: pwsh
        run: cargo rustc -p substrate-telemetry --profile dist --crate-type=rlib,cdylib

      - name: cargo test
        if: env.CI_MODE != 'compile-parity'
        run: cargo test --workspace --all-targets
        env:
          RUST_TEST_THREADS: 1

      - name: Shell lint (Linux)
        if: runner.os == 'Linux' && env.CI_MODE != 'compile-parity'
        run: |
          git ls-files '*.sh' | xargs -r shellcheck -x -S warning

      - name: Substrate CLI smoke test (Linux/macOS)
        if: runner.os != 'Windows' && env.CI_MODE != 'compile-parity'
        run: cargo run --bin substrate -- --version

      - name: Substrate CLI smoke test (Windows)
        if: runner.os == 'Windows' && env.CI_MODE != 'compile-parity'
        shell: pwsh
        run: cargo run --bin substrate -- --version

  docs-and-packaging:
    name: Docs & Packaging Checks
    if: ${{ github.event_name == 'pull_request' || (inputs.mode || github.event.inputs.mode || 'full') == 'full' }}
    needs: lint-and-test
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository (override ref)
        if: inputs.checkout_ref != ''
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.checkout_ref }}
          submodules: recursive

      - name: Checkout repository
        if: inputs.checkout_ref == ''
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libseccomp-dev shellcheck shfmt

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt

      - name: Cache cargo artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: docs-${{ env.RUST_TOOLCHAIN }}-${{ github.sha }}
          restore-keys: |
            docs-${{ env.RUST_TOOLCHAIN }}-

      - name: Generate documentation
        run: cargo doc --workspace --no-deps

  cross-build:
    name: Cross Build (${{ matrix.target }})
    if: ${{ github.event_name == 'pull_request' || (inputs.mode || github.event.inputs.mode || 'full') == 'full' }}
    needs: lint-and-test
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-unknown-linux-gnu
            build_cdylib: true
          - target: x86_64-unknown-linux-musl
            build_cdylib: false

    steps:
      - name: Checkout repository (override ref)
        if: inputs.checkout_ref != ''
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.checkout_ref }}
          submodules: recursive

      - name: Checkout repository
        if: inputs.checkout_ref == ''
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Install cross
        run: cargo install cross --version 0.2.4 --locked

      - name: Cache cargo artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cross-${{ matrix.target }}-${{ env.RUST_TOOLCHAIN }}-${{ github.sha }}
          restore-keys: |
            cross-${{ matrix.target }}-${{ env.RUST_TOOLCHAIN }}-

      - name: Build ${{ matrix.target }}
        run: cross build --workspace --target ${{ matrix.target }} --profile dist

      - name: Build telemetry cdylib (${{ matrix.target }})
        if: matrix.build_cdylib
        run: cross rustc -p substrate-telemetry --target ${{ matrix.target }} --profile dist --crate-type=rlib,cdylib
