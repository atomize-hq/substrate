name: Feature Smoke (Planning Pack)

on:
  workflow_dispatch:
    inputs:
      feature_dir:
        description: "Feature Planning Pack directory (e.g., docs/project_management/_archived/next/world-sync)"
        required: true
        type: string
      checkout_ref:
        description: "Git ref to checkout for running the smoke scripts (defaults to the workflow ref)."
        required: false
        type: string
        default: ""
      runner_kind:
        description: "Where to run the smoke job(s)"
        required: true
        type: choice
        options:
          - github-hosted
          - self-hosted
        default: github-hosted
      macos_runner_kind:
        description: "Override where macOS runs when runner_kind=self-hosted (hybrid fallback)."
        required: false
        type: choice
        options:
          - self-hosted
          - github-hosted
        default: self-hosted
      platform:
        description: "Which platform smoke to run"
        required: true
        type: choice
        options:
          - behavior
          - linux
          - macos
          - windows
          - wsl
          - all
      run_wsl:
        description: "Also run WSL smoke (requires suitable runner)"
        required: false
        type: boolean
        default: false
      run_integ_checks:
        description: "Also run full integration checks (fmt --check, clippy -D warnings, workspace tests) before smoke."
        required: false
        type: boolean
        default: false
      smoke_slice_id:
        description: "Optional slice id (e.g., WCU1) passed to smoke scripts as SUBSTRATE_SMOKE_SLICE_ID."
        required: false
        type: string
        default: ""

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: 1.89.0
  SUBSTRATE_SMOKE_SLICE_ID: ${{ inputs.smoke_slice_id }}

permissions:
  contents: read

jobs:
  validate_inputs:
    runs-on: ubuntu-24.04
    steps:
      - name: Validate inputs
        shell: bash
        run: |
          set -euo pipefail
          platform="${{ inputs.platform }}"
          runner_kind="${{ inputs.runner_kind }}"
          run_wsl="${{ inputs.run_wsl }}"

          if [[ "${platform}" == "wsl" && "${runner_kind}" != "self-hosted" ]]; then
            echo "ERROR: platform=wsl requires runner_kind=self-hosted" >&2
            exit 1
          fi

          if [[ "${run_wsl}" == "true" && "${runner_kind}" != "self-hosted" ]]; then
            echo "ERROR: run_wsl=true requires runner_kind=self-hosted" >&2
            exit 1
          fi

  feature_meta:
    needs: validate_inputs
    runs-on: ubuntu-24.04
    outputs:
      run_linux: ${{ steps.meta.outputs.run_linux }}
      run_macos: ${{ steps.meta.outputs.run_macos }}
      run_windows: ${{ steps.meta.outputs.run_windows }}
    steps:
      - name: Checkout repository (override ref)
        if: inputs.checkout_ref != ''
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.checkout_ref }}
          submodules: recursive

      - name: Checkout repository
        if: inputs.checkout_ref == ''
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Compute selected platforms
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          selection="${{ inputs.platform }}"
          feature_dir="${{ inputs.feature_dir }}"
          tasks_json="${feature_dir}/tasks.json"

          run_linux=0
          run_macos=0
          run_windows=0

          case "${selection}" in
            all)
              run_linux=1
              run_macos=1
              run_windows=1
              ;;
            linux) run_linux=1 ;;
            macos) run_macos=1 ;;
            windows) run_windows=1 ;;
            wsl) : ;; # WSL handled by dedicated job condition.
            behavior)
              if [[ ! -f "${tasks_json}" ]]; then
                echo "ERROR: missing ${tasks_json} (required for platform=behavior)" >&2
                exit 1
              fi
              if ! command -v jq >/dev/null 2>&1; then
                sudo apt-get update
                sudo apt-get install -y jq
              fi
              required="$(jq -r '.meta.behavior_platforms_required[]? // empty' "${tasks_json}")"
              while IFS= read -r p; do
                case "${p}" in
                  linux) run_linux=1 ;;
                  macos) run_macos=1 ;;
                  windows) run_windows=1 ;;
                  "" ) ;;
                  *) echo "WARN: ignoring unknown behavior platform in ${tasks_json}: ${p}" >&2 ;;
                esac
              done <<< "${required}"
              ;;
            *)
              echo "ERROR: invalid platform selection: ${selection}" >&2
              exit 1
              ;;
          esac

          echo "run_linux=${run_linux}" >> "$GITHUB_OUTPUT"
          echo "run_macos=${run_macos}" >> "$GITHUB_OUTPUT"
          echo "run_windows=${run_windows}" >> "$GITHUB_OUTPUT"

  linux_hosted:
    needs: feature_meta
    if: needs.feature_meta.outputs.run_linux == '1' && inputs.runner_kind == 'github-hosted'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository (override ref)
        if: inputs.checkout_ref != ''
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.checkout_ref }}
          submodules: recursive

      - name: Checkout repository
        if: inputs.checkout_ref == ''
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq ripgrep pkg-config libseccomp-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt, clippy

      - name: Run integration checks (Linux)
        if: inputs.run_integ_checks
        run: |
          cargo fmt --all -- --check
          cargo clippy --workspace --all-targets -- -D warnings
          cargo test --workspace --all-targets

      - name: Build substrate (debug)
        run: cargo build --bin substrate --bin substrate-shim

      - name: Add substrate to PATH
        run: echo "$GITHUB_WORKSPACE/target/debug" >> "$GITHUB_PATH"

      - name: Run linux smoke
        shell: bash
        run: |
          set -euo pipefail
          export SUBSTRATE_BIN="$GITHUB_WORKSPACE/target/debug/substrate"
          export SUBSTRATE_WORLD_REQUEST_PROFILE="world-deps-provision"
          bash "${{ inputs.feature_dir }}/smoke/linux-smoke.sh"

  linux_self_hosted:
    needs: feature_meta
    if: needs.feature_meta.outputs.run_linux == '1' && inputs.runner_kind == 'self-hosted'
    runs-on: [self-hosted, Linux, linux-host]
    steps:
      - name: Checkout repository (workflow ref)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Checkout repository (candidate ref)
        if: inputs.checkout_ref != ''
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.checkout_ref }}
          submodules: recursive
          path: candidate

      - name: Select build checkout
        id: checkout_dir
        shell: bash
        run: |
          set -euo pipefail
          if [[ -d "$GITHUB_WORKSPACE/candidate" ]]; then
            echo "dir=candidate" >> "$GITHUB_OUTPUT"
          else
            echo "dir=." >> "$GITHUB_OUTPUT"
          fi

      - name: Provision world-agent (Linux self-hosted; WAPS)
        if: startsWith(inputs.feature_dir, 'docs/project_management/packs/draft/world-deps-apt-provisioning') || startsWith(inputs.feature_dir, 'docs/project_management/_archived/next/world-sync') || startsWith(inputs.feature_dir, 'docs/project_management/_archived/world-agent-policy-snapshot') || startsWith(inputs.feature_dir, 'docs/project_management/_archived/full-isolation-landlock-overlayfs-compat')
        working-directory: ${{ steps.checkout_dir.outputs.dir }}
        run: |
          set -euo pipefail
          if [[ -S /run/substrate.sock && -w /run/substrate.sock ]]; then
            echo "Using existing system world-agent socket"
          elif sudo -n true >/dev/null 2>&1; then
            cargo build -p world-agent --release
            scripts/linux/world-provision.sh --profile release --skip-build --sudo-noninteractive
          else
            echo "WARN: sudo -n unavailable on this runner; smoke will fall back to a user-scoped socket if needed" >&2
          fi

      - name: Preflight substrate world socket (Linux self-hosted)
        shell: bash
        run: |
          set -euo pipefail
          sock="/run/substrate.sock"

          if [[ -S "${sock}" && -w "${sock}" ]]; then
            exit 0
          fi

          echo "WARN: system world-agent socket unavailable; smoke will try a user-scoped socket fallback" >&2
          if [[ -e "${sock}" ]]; then
            ls -l "${sock}" >&2 || true
            stat "${sock}" >&2 || true
          fi
          echo "  id: $(id -a || true)" >&2

      - name: Ensure rustup is on PATH (Linux self-hosted)
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$HOME/.cargo/bin:$PATH"
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

          if command -v rustup >/dev/null 2>&1; then
            rustup --version
            exit 0
          fi

          echo "ERROR: rustup is required on self-hosted runners but was not found." >&2
          echo "Fix runner provisioning so the runner service PATH includes rustup (usually: $HOME/.cargo/bin)." >&2
          echo "If the runner is installed under /opt/actions-runner, update /opt/actions-runner/.path to prepend $HOME/.cargo/bin and restart the runner service." >&2
          echo "Current PATH: $PATH" >&2
          exit 1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt, clippy

      - name: Preflight native deps (Linux)
        run: |
          if ! command -v pkg-config >/dev/null 2>&1; then
            echo "Missing pkg-config. Install it (e.g., pkgconf/pkg-config) on this runner." >&2
            exit 1
          fi
          if ! pkg-config --exists libseccomp; then
            echo "Missing libseccomp development package on this runner." >&2
            echo "  - Ubuntu/Debian: sudo apt-get install -y libseccomp-dev pkg-config" >&2
            echo "  - Manjaro/Arch:  sudo pacman -Syu --needed libseccomp pkgconf" >&2
            exit 1
          fi

      - name: Run integration checks (Linux self-hosted)
        if: inputs.run_integ_checks
        working-directory: ${{ steps.checkout_dir.outputs.dir }}
        run: |
          cargo fmt --all -- --check
          cargo clippy --workspace --all-targets -- -D warnings
          cargo test --workspace --all-targets

      - name: Build substrate + world-agent (debug)
        working-directory: ${{ steps.checkout_dir.outputs.dir }}
        run: |
          cargo build --bin substrate --bin substrate-shim
          cargo build -p world-agent --bin world-agent

      - name: Add substrate to PATH
        shell: bash
        run: |
          set -euo pipefail
          dir="${{ steps.checkout_dir.outputs.dir }}"
          if [[ "${dir}" == "candidate" ]]; then
            echo "$GITHUB_WORKSPACE/candidate/target/debug" >> "$GITHUB_PATH"
          else
            echo "$GITHUB_WORKSPACE/target/debug" >> "$GITHUB_PATH"
          fi

      - name: Run linux smoke
        working-directory: ${{ steps.checkout_dir.outputs.dir }}
        shell: bash
        run: |
          set -euo pipefail
          export SUBSTRATE_BIN="$PWD/target/debug/substrate"
          export SUBSTRATE_WORLD_REQUEST_PROFILE="world-deps-provision"

          manual_sock=""
          manual_log=""
          agent_pid=""
          cleanup() {
            if [[ -n "${agent_pid}" ]]; then
              kill "${agent_pid}" >/dev/null 2>&1 || true
              wait "${agent_pid}" >/dev/null 2>&1 || true
            fi
            if [[ -n "${manual_sock}" ]]; then
              rm -f "${manual_sock}" >/dev/null 2>&1 || true
            fi
          }
          trap cleanup EXIT

          if [[ -S /run/substrate.sock && -w /run/substrate.sock ]]; then
            export SUBSTRATE_WORLD_SOCKET="/run/substrate.sock"
          else
            socket_activate="$(command -v systemd-socket-activate || true)"
            if [[ -z "${socket_activate}" ]]; then
              echo "ERROR: systemd-socket-activate is required when /run/substrate.sock is unavailable" >&2
              exit 1
            fi

            manual_sock="${RUNNER_TEMP:-/tmp}/substrate-world-agent.sock"
            manual_log="${RUNNER_TEMP:-/tmp}/substrate-world-agent.log"
            rm -f "${manual_sock}" "${manual_log}"

            "${socket_activate}" --listen="${manual_sock}" --fdname=substrate-world-agent "$PWD/target/debug/world-agent" >"${manual_log}" 2>&1 &
            agent_pid=$!

            for _ in $(seq 1 50); do
              if [[ -S "${manual_sock}" ]]; then
                break
              fi
              sleep 0.2
            done

            if [[ ! -S "${manual_sock}" ]]; then
              echo "ERROR: failed to start user-scoped world-agent socket fallback" >&2
              [[ -f "${manual_log}" ]] && cat "${manual_log}" >&2
              exit 1
            fi

            export SUBSTRATE_WORLD_SOCKET="${manual_sock}"
            echo "Using user-scoped world-agent socket fallback: ${manual_sock}"
          fi

          if ! bash "${{ inputs.feature_dir }}/smoke/linux-smoke.sh"; then
            [[ -n "${manual_log}" && -f "${manual_log}" ]] && cat "${manual_log}" >&2
            exit 1
          fi

  macos_hosted:
    needs: feature_meta
    if: needs.feature_meta.outputs.run_macos == '1' && (inputs.runner_kind == 'github-hosted' || (inputs.runner_kind == 'self-hosted' && inputs.macos_runner_kind == 'github-hosted'))
    runs-on: macos-14
    steps:
      - name: Checkout repository (override ref)
        if: inputs.checkout_ref != ''
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.checkout_ref }}
          submodules: recursive

      - name: Checkout repository
        if: inputs.checkout_ref == ''
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          brew update
          if ! command -v jq >/dev/null 2>&1; then brew install jq; fi
          if ! command -v rg >/dev/null 2>&1; then brew install ripgrep; fi
          if ! command -v limactl >/dev/null 2>&1; then brew install lima; fi
          if ! command -v envsubst >/dev/null 2>&1; then brew install gettext; fi

          # Prefer Homebrew gettext/envsubst and Lima on PATH for subsequent steps.
          if command -v brew >/dev/null 2>&1; then
            echo \"$(brew --prefix gettext)/bin\" >> \"$GITHUB_PATH\" || true
            echo \"$(brew --prefix lima)/bin\" >> \"$GITHUB_PATH\" || true
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt, clippy

      - name: Run integration checks (macOS)
        if: inputs.run_integ_checks
        run: |
          cargo fmt --all -- --check
          cargo clippy --workspace --all-targets -- -D warnings
          cargo test --workspace --all-targets

      - name: Build substrate (debug)
        run: cargo build --bin substrate --bin substrate-shim

      - name: Add substrate to PATH
        run: echo "$GITHUB_WORKSPACE/target/debug" >> "$GITHUB_PATH"

      - name: Run macOS smoke
        shell: bash
        run: |
          set -euo pipefail
          export SUBSTRATE_BIN="$GITHUB_WORKSPACE/target/debug/substrate"
          bash "${{ inputs.feature_dir }}/smoke/macos-smoke.sh"

  macos_self_hosted:
    needs: feature_meta
    if: needs.feature_meta.outputs.run_macos == '1' && inputs.runner_kind == 'self-hosted' && inputs.macos_runner_kind != 'github-hosted'
    runs-on: [self-hosted, macOS]
    env:
      CARGO_BUILD_JOBS: 2
      RUST_TEST_THREADS: 1
    steps:
      - name: Checkout repository (workflow ref)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Checkout repository (candidate ref)
        if: inputs.checkout_ref != ''
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.checkout_ref }}
          submodules: recursive
          path: candidate

      - name: Select build checkout
        id: checkout_dir
        shell: bash
        run: |
          set -euo pipefail
          if [[ -d "$GITHUB_WORKSPACE/candidate" ]]; then
            echo "dir=candidate" >> "$GITHUB_OUTPUT"
          else
            echo "dir=." >> "$GITHUB_OUTPUT"
          fi

      - name: Prevent sleep (macOS self-hosted)
        run: caffeinate -dimsu &

      - name: Warm Lima world (macOS self-hosted; WAPS)
        if: startsWith(inputs.feature_dir, 'docs/project_management/packs/draft/world-deps-apt-provisioning') || startsWith(inputs.feature_dir, 'docs/project_management/_archived/next/world-sync') || startsWith(inputs.feature_dir, 'docs/project_management/_archived/world-agent-policy-snapshot') || startsWith(inputs.feature_dir, 'docs/project_management/_archived/full-isolation-landlock-overlayfs-compat')
        working-directory: ${{ steps.checkout_dir.outputs.dir }}
        run: bash scripts/mac/lima-warm.sh "$PWD"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt, clippy

      - name: Run integration checks (macOS self-hosted)
        if: inputs.run_integ_checks
        working-directory: ${{ steps.checkout_dir.outputs.dir }}
        run: |
          cargo fmt --all -- --check
          cargo clippy --workspace --all-targets -- -D warnings
          cargo test --workspace --all-targets

      - name: Build substrate (debug)
        working-directory: ${{ steps.checkout_dir.outputs.dir }}
        run: cargo build --bin substrate --bin substrate-shim

      - name: Add substrate to PATH
        shell: bash
        run: |
          set -euo pipefail
          dir="${{ steps.checkout_dir.outputs.dir }}"
          if [[ "${dir}" == "candidate" ]]; then
            echo "$GITHUB_WORKSPACE/candidate/target/debug" >> "$GITHUB_PATH"
          else
            echo "$GITHUB_WORKSPACE/target/debug" >> "$GITHUB_PATH"
          fi

      - name: Run macOS smoke
        working-directory: ${{ steps.checkout_dir.outputs.dir }}
        shell: bash
        run: |
          set -euo pipefail
          export SUBSTRATE_BIN="$PWD/target/debug/substrate"
          bash "${{ inputs.feature_dir }}/smoke/macos-smoke.sh"

  windows_hosted:
    needs: feature_meta
    if: needs.feature_meta.outputs.run_windows == '1' && inputs.runner_kind == 'github-hosted'
    runs-on: windows-2022
    steps:
      - name: Checkout repository (override ref)
        if: inputs.checkout_ref != ''
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.checkout_ref }}
          submodules: recursive

      - name: Checkout repository
        if: inputs.checkout_ref == ''
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt, clippy

      - name: Run integration checks (Windows)
        if: inputs.run_integ_checks
        shell: pwsh
        run: |
          cargo fmt --all -- --check
          cargo clippy --workspace --all-targets -- -D warnings
          cargo test --workspace --all-targets

      - name: Build substrate (debug)
        run: cargo build --bin substrate --bin substrate-shim

      - name: Add substrate to PATH
        shell: pwsh
        run: Add-Content -LiteralPath $env:GITHUB_PATH -Value "$pwd\\target\\debug"

      - name: Run Windows smoke
        shell: pwsh
        env:
          SUBSTRATE_EXE: ${{ github.workspace }}\target\debug\substrate.exe
        run: pwsh -File "${{ inputs.feature_dir }}/smoke/windows-smoke.ps1"

  windows_self_hosted:
    needs: feature_meta
    if: needs.feature_meta.outputs.run_windows == '1' && inputs.runner_kind == 'self-hosted'
    runs-on: [self-hosted, Windows]
    steps:
      - name: Checkout repository (override ref)
        if: inputs.checkout_ref != ''
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.checkout_ref }}
          submodules: recursive

      - name: Checkout repository
        if: inputs.checkout_ref == ''
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Ensure Rust toolchain (self-hosted)
        shell: pwsh
        run: |
          if (-not (Get-Command rustup -ErrorAction SilentlyContinue)) {
            Write-Host "rustup not found; installing rustup for the runner user..."
            $rustupInit = Join-Path $env:RUNNER_TEMP "rustup-init.exe"
            Invoke-WebRequest -Uri "https://static.rust-lang.org/rustup/dist/x86_64-pc-windows-msvc/rustup-init.exe" -OutFile $rustupInit
            & $rustupInit -y --profile minimal --default-toolchain $env:RUST_TOOLCHAIN
          }

          $cargoBin = Join-Path $env:USERPROFILE ".cargo\\bin"
          if (Test-Path $cargoBin) {
            $env:Path = "$cargoBin;$env:Path"
            Add-Content -LiteralPath $env:GITHUB_PATH -Value $cargoBin
          }

          $rustupExe = Join-Path $cargoBin "rustup.exe"
          if (-not (Test-Path $rustupExe)) {
            throw "rustup.exe not found at expected path: $rustupExe"
          }

          & $rustupExe toolchain install $env:RUST_TOOLCHAIN --profile minimal
          & $rustupExe component add rustfmt clippy --toolchain $env:RUST_TOOLCHAIN
          rustc --version
          cargo --version

      - name: Run integration checks (Windows self-hosted)
        if: inputs.run_integ_checks
        shell: pwsh
        run: |
          cargo fmt --all -- --check
          cargo clippy --workspace --all-targets -- -D warnings
          cargo test --workspace --all-targets

      - name: Warm WSL world (Windows self-hosted; WAPS)
        if: startsWith(inputs.feature_dir, 'docs/project_management/_archived/world-agent-policy-snapshot')
        shell: pwsh
        env:
          # The Windows WSL backend is expected to use the named pipe forwarder; disable the TCP bridge
          # even if the runner machine has SUBSTRATE_FORWARDER_TCP=1 set globally.
          SUBSTRATE_FORWARDER_TCP: "0"
        run: pwsh -File scripts/windows/wsl-warm.ps1 -DistroName substrate-wsl -ProjectPath (Resolve-Path .)

      - name: Build substrate (debug)
        run: cargo build --bin substrate --bin substrate-shim

      - name: Add substrate to PATH
        shell: pwsh
        run: Add-Content -LiteralPath $env:GITHUB_PATH -Value "$pwd\\target\\debug"

      - name: Run Windows smoke
        shell: pwsh
        env:
          # Force pipe transport regardless of runner-global environment.
          SUBSTRATE_FORWARDER_TCP: "0"
          SUBSTRATE_EXE: ${{ github.workspace }}\target\debug\substrate.exe
        run: pwsh -File "${{ inputs.feature_dir }}/smoke/windows-smoke.ps1"

  wsl:
    needs: validate_inputs
    if: inputs.runner_kind == 'self-hosted' && (inputs.run_wsl || inputs.platform == 'wsl')
    runs-on: [self-hosted, Linux, wsl]
    steps:
      - name: Checkout repository (workflow ref)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Checkout repository (candidate ref)
        if: inputs.checkout_ref != ''
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.checkout_ref }}
          submodules: recursive
          path: candidate

      - name: Select build checkout
        id: checkout_dir
        shell: bash
        run: |
          set -euo pipefail
          if [[ -d "$GITHUB_WORKSPACE/candidate" ]]; then
            echo "dir=candidate" >> "$GITHUB_OUTPUT"
          else
            echo "dir=." >> "$GITHUB_OUTPUT"
          fi

      - name: Preflight substrate world socket (WSL runner)
        shell: bash
        run: |
          set -euo pipefail
          sock="/run/substrate.sock"

          if [[ ! -S "${sock}" ]]; then
            echo "SUBSTRATE_RUNNER_MISPROVISIONED=1"
            echo "SUBSTRATE_RUNNER_MISPROVISIONED_REASON=substrate_sock_missing"
            echo "WSL runner is missing required world-agent socket: ${sock}" >&2
            echo "Remediation: provision the world agent + ensure the runner user can access ${sock} (root:substrate 0660)." >&2
            echo "Diagnostics: id=$(id -a || true)" >&2
            exit 1
          fi

          if [[ ! -w "${sock}" ]]; then
            echo "SUBSTRATE_RUNNER_MISPROVISIONED=1"
            echo "SUBSTRATE_RUNNER_MISPROVISIONED_REASON=substrate_sock_permission_denied"
            echo "WSL runner cannot access required world-agent socket: ${sock} (need write permission to connect)" >&2
            echo "Remediation: ensure runner user is in substrate group + restart runner service; confirm ${sock} is root:substrate 0660." >&2
            ls -l "${sock}" >&2 || true
            stat "${sock}" >&2 || true
            echo "Diagnostics: id=$(id -a || true)" >&2
            exit 1
          fi

      - name: Ensure rustup is on PATH (WSL runner)
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$HOME/.cargo/bin:$PATH"
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

          if command -v rustup >/dev/null 2>&1; then
            rustup --version
            exit 0
          fi

          echo "ERROR: rustup is required on self-hosted runners but was not found." >&2
          echo "Fix runner provisioning so the runner service PATH includes rustup (usually: $HOME/.cargo/bin)." >&2
          echo "If the runner is installed under /opt/actions-runner, update /opt/actions-runner/.path to prepend $HOME/.cargo/bin and restart the runner service." >&2
          echo "Current PATH: $PATH" >&2
          exit 1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt, clippy

      - name: Preflight native deps (WSL runner)
        run: |
          if ! command -v pkg-config >/dev/null 2>&1; then
            echo "Missing pkg-config. Install it on this runner." >&2
            exit 1
          fi
          if ! pkg-config --exists libseccomp; then
            echo "Missing libseccomp development package on this runner." >&2
            exit 1
          fi

      - name: Run integration checks (WSL runner)
        if: inputs.run_integ_checks
        working-directory: ${{ steps.checkout_dir.outputs.dir }}
        run: |
          cargo fmt --all -- --check
          cargo clippy --workspace --all-targets -- -D warnings
          cargo test --workspace --all-targets

      - name: Build substrate (debug)
        working-directory: ${{ steps.checkout_dir.outputs.dir }}
        run: cargo build --bin substrate --bin substrate-shim

      - name: Add substrate to PATH
        shell: bash
        run: |
          set -euo pipefail
          dir="${{ steps.checkout_dir.outputs.dir }}"
          if [[ "${dir}" == "candidate" ]]; then
            echo "$GITHUB_WORKSPACE/candidate/target/debug" >> "$GITHUB_PATH"
          else
            echo "$GITHUB_WORKSPACE/target/debug" >> "$GITHUB_PATH"
          fi

      - name: Run WSL (Linux) smoke
        shell: bash
        run: |
          set -euo pipefail
          dir="${{ steps.checkout_dir.outputs.dir }}"
          if [[ "${dir}" == "candidate" ]]; then
            export SUBSTRATE_BIN="$GITHUB_WORKSPACE/candidate/target/debug/substrate"
          else
            export SUBSTRATE_BIN="$GITHUB_WORKSPACE/target/debug/substrate"
          fi
          export SUBSTRATE_WORLD_REQUEST_PROFILE="world-deps-provision"
          bash "${{ inputs.feature_dir }}/smoke/linux-smoke.sh"
